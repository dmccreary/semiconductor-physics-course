<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Crystal Defect Hierarchy Network</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background: #fff; }
        #wrap { max-width: 1100px; margin: 0 auto; padding: 8px; }
        h2 { text-align: center; margin: 6px 0 10px; font-size: 18px; color: #1a3a6c; }
        #layout { display: flex; gap: 10px; }
        #netbox { flex: 1; min-width: 0; border: 1px solid #ced4da; border-radius: 6px; background: #fafafa; height: 460px; }
        #info {
            width: 280px;
            border: 1px solid #c8d3e1;
            background: #f4f6fa;
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.45;
            min-height: 460px;
            box-sizing: border-box;
        }
        #info h3 { margin: 0 0 6px; font-size: 15px; color: #1a3a6c; }
        #info .dim { display: inline-block; background: #1976d2; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        #info p { margin: 6px 0; }
        #info b { color: #455a64; }
        .legend { font-size: 12px; padding: 4px 8px; color: #555; text-align: center; }
        .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; margin: 0 4px 0 10px; }
    </style>
    <script src="defect-hierarchy-network.js"></script>
</head>
<body>
    <main>
        <div id="wrap">
            <h2>Crystal Defect Hierarchy</h2>
            <div class="legend">
                <span class="swatch" style="background:#90caf9"></span>0D Point
                <span class="swatch" style="background:#ffb74d"></span>1D Line
                <span class="swatch" style="background:#a5d6a7"></span>2D Planar
                <span class="swatch" style="background:#ef9a9a"></span>3D Volume
                &mdash; click a defect node for details.
            </div>
            <div id="layout">
                <div id="netbox"></div>
                <div id="info">
                    <h3>Select a defect</h3>
                    <p>Click any leaf node in the tree to see its formation mechanism, the device parameters it degrades, and a real-world example.</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
