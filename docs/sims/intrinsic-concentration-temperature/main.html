<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Temperature Dependence of nᵢ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background: #fff; }
        #wrap { max-width: 900px; margin: 0 auto; padding: 8px; }
        h2 { text-align: center; margin: 6px 0 8px; font-size: 18px; color: #1a3a6c; }
        .controls { padding: 6px 10px; font-size: 14px; }
        .controls label { margin-right: 12px; }
        #info {
            margin-top: 8px; padding: 8px 12px;
            background: #f4f6fa;
            border: 1px solid #c8d3e1;
            border-radius: 6px;
            font-size: 13px;
            min-height: 44px;
        }
        #info b { color: #1a3a6c; }
        #chartwrap { position: relative; height: 380px; }
    </style>
    <script src="intrinsic-concentration-temperature.js"></script>
</head>
<body>
    <main>
        <div id="wrap">
            <h2>Intrinsic Carrier Concentration vs Temperature</h2>
            <div class="controls">
                <label>Donor doping N<sub>D</sub>: <select id="nd">
                    <option value="1e15" selected>10¹⁵ cm⁻³ (light)</option>
                    <option value="1e16">10¹⁶ cm⁻³ (moderate)</option>
                    <option value="1e17">10¹⁷ cm⁻³ (heavy)</option>
                </select></label>
            </div>
            <div id="chartwrap"><canvas id="chart"></canvas></div>
            <div id="info">Hover a point to see material details. Click a line to see its maximum safe operating temperature.</div>
        </div>
    </main>
</body>
</html>
